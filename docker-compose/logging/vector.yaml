# Host-level Docker log shipper for the `minion` server.
#
# Tails stdout/stderr of every container the local Docker daemon knows
# about and publishes one AMQP message per line, exactly as Docker
# emitted it, to the topic exchange `containers-logs` on vhost
# `minion` of the in-stack RabbitMQ broker (the-rabbit). No body
# parsing happens here — subscribers decide if/how to parse JSON
# payloads on their side.
#
# Routing key: <project>.<container_name>.<stream>
#   - project: docker compose project label
#     (`com.docker.compose.project`); "standalone" for containers
#     started outside of compose.
#   - container_name: Docker name (any `.` -> `-` to keep segments stable)
#   - stream: "stdout" or "stderr", straight from Docker
#
# Env vars (set in /etc/default/vector):
#   DOCKER_HOST            unix socket of the local Docker daemon
#   RABBITMQ_HOST          host:port reachable from this host
#   MINION_LOGS_PASSWORD   password for AMQP user `minion_logs`

sources:
  containers:
    type: docker_logs
    docker_host: "${DOCKER_HOST:-unix:///var/run/docker.sock}"
    auto_partial_merge: true   # merges Docker's 16KB-split lines back

transforms:
  routing_metadata:
    type: remap
    inputs: ["containers"]
    source: |
      # `.` is the topic-key segment separator; flatten any literal
      # dots so the routing key always has exactly 3 segments.
      .container_name = replace(string!(.container_name), ".", "-")
      project = string(.label."com.docker.compose.project") ?? "standalone"
      .project = replace(project, ".", "-")

sinks:
  rabbit:
    type: amqp
    inputs: ["routing_metadata"]
    connection_string: "amqp://admin:${MINION_LOGS_PASSWORD}@${RABBITMQ_HOST:-localhost}:5672/minion"
    exchange: "containers-logs"
    routing_key: "{{ .project }}.{{ .container_name }}.{{ .stream }}"
    encoding:
      codec: json
    buffer:
      type: memory
      max_events: 10000
      when_full: drop_newest
